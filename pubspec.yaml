name: flutter_body_calculator_app
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ">=3.11.3 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2          # รวบรวม fonts จาก Google มาใช้ใน Flutter
  font_awesome_flutter: ^11.0.0 # รวบรวมไอคอนจาก Font Awesome มาใช้ใน Flutter
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/ # เพิ่มโฟลเดอร์สำหรับเก็บรูปภาพในโปรเจค